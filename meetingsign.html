<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院會議與活動管理系統 - 豐原醫院</title>
    
    <!-- 資源載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* 簽名彈窗全螢幕優化 */
        #signature-modal {
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sig-modal-content {
            height: 100dvh;
            width: 100vw;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .signature-pad-canvas {
            touch-action: none !important;
            cursor: crosshair;
            background-color: #ffffff;
            width: 100% !important;
            height: 100% !important;
            display: block;
            -webkit-touch-callout: none;
        }

        /* 橫向模式：佈局優化 */
        @media (orientation: landscape) {
            .sig-layout { flex-direction: row !important; height: 100%; }
            .sig-main-area { flex: 1 !important; height: 100% !important; padding: 0.5rem !important; }
            .sig-side-bar {
                width: 140px !important;
                height: 100% !important;
                border-left: 1px solid #e2e8f0;
                display: flex !important;
                flex-direction: column !important;
                padding: 0.75rem !important;
                justify-content: center !important;
                gap: 0.5rem !important;
                background: #fff;
            }
            .sig-header-info { padding: 0.5rem 1rem !important; height: auto !important; border-bottom: 1px solid #e2e8f0; }
            .portrait-warning { display: none !important; }
            .landscape-content { display: flex !important; flex: 1; flex-direction: column; }
        }

        /* 直向模式：強制警告 */
        @media (orientation: portrait) {
            .portrait-warning { display: flex !important; flex: 1; }
            .landscape-content { display: none !important; }
        }

        .lock-scroll {
            overflow: hidden !important;
            height: 100vh !important;
            position: fixed !important;
            width: 100% !important;
        }

        #pdf-export-container { position: absolute; left: -9999px; top: 0; }
        .hidden-view { display: none !important; }
        
        .btn-hover { transition: all 0.2s ease; }
        .btn-hover:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-blue-800 text-white shadow-lg p-4 sticky top-0 z-40">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <button id="back-btn" class="p-1 hover:bg-blue-900 rounded transition-colors hidden">
                    <i data-lucide="arrow-left"></i>
                </button>
                <h1 class="text-xl font-bold tracking-widest">會議與報名系統</h1>
            </div>
            <div id="header-actions" class="flex items-center space-x-3">
                <button id="nav-groups-btn" class="bg-blue-900 p-2 rounded-full hover:bg-blue-950" title="管理群組">
                    <i data-lucide="users"></i>
                </button>
                <button id="open-add-meeting-btn" class="bg-white text-blue-800 p-2 rounded-full shadow-lg hover:bg-blue-50" title="建立新活動">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <!-- 載入中 -->
        <div id="loading-view" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin text-blue-600 mb-4"><i data-lucide="loader-2" size="48"></i></div>
            <p class="text-slate-500 font-bold tracking-widest">資料庫連線中...</p>
            <p class="text-xs text-slate-400 mt-2">若卡住請重新整理或檢查網路設定</p>
        </div>

        <!-- 會議列表 -->
        <div id="list-view" class="space-y-4 mt-2 hidden-view animate-in fade-in duration-300">
            <div id="meetings-container" class="space-y-4"></div>
        </div>

        <!-- 會議詳情 -->
        <div id="detail-view" class="space-y-6 hidden-view animate-in slide-in-from-right duration-300">
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 overflow-hidden relative">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div class="flex-1">
                        <div class="flex items-start gap-2">
                            <h2 id="detail-title" class="text-2xl font-black text-slate-800 leading-tight"></h2>
                            <button id="main-edit-btn" class="mt-1 p-1.5 text-slate-300 hover:text-blue-600 transition-colors" title="編輯活動">
                                <i data-lucide="settings" size="18"></i>
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 font-bold text-sm">
                            <span id="detail-date" class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full shadow-sm"></span>
                            <span id="detail-time" class="bg-slate-100 px-4 py-1.5 rounded-full text-slate-600"></span>
                            <span id="detail-location" class="bg-slate-100 px-4 py-1.5 rounded-full text-slate-600"></span>
                        </div>
                        <div class="mt-4 p-3 bg-red-50 border border-red-100 rounded-2xl hidden" id="sign-time-warning">
                            <p class="text-red-600 text-xs font-bold flex items-center">
                                <i data-lucide="clock" class="mr-1" size="14"></i> 
                                目前非簽到時間 (<span id="allowed-sign-range"></span>)
                            </p>
                        </div>
                        <div class="mt-5 flex items-center gap-2 bg-slate-50 w-fit px-3 py-1 rounded-xl">
                            <span class="text-slate-500 text-xs font-bold uppercase tracking-wider">主席</span>
                            <span id="detail-chairman" class="font-black text-slate-800"></span>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 items-center">
                        <button id="show-qr-btn" class="bg-slate-100 p-3 rounded-2xl hover:bg-slate-200" title="簽到 QR"><i data-lucide="qr-code"></i></button>
                        <button id="show-reg-qr-btn" class="bg-orange-50 text-orange-600 p-3 rounded-2xl hover:bg-orange-100" title="報名 QR"><i data-lucide="user-plus"></i></button>
                        <button id="direct-reg-btn" class="bg-orange-600 text-white px-4 py-2 rounded-2xl font-black hover:bg-orange-700 text-sm">報名</button>
                        <button id="nav-admin-btn" class="bg-slate-900 text-white px-4 py-2 rounded-2xl font-black hover:bg-black text-sm">管理</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                    <div class="bg-gradient-to-br from-blue-50 to-white p-5 rounded-3xl border border-blue-100 shadow-sm">
                        <p class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em]">Attendance Rate</p>
                        <p id="stat-rate" class="text-4xl font-black text-blue-900 mt-1">0%</p>
                    </div>
                    <div class="bg-gradient-to-br from-emerald-50 to-white p-5 rounded-3xl border border-emerald-100 shadow-sm">
                        <p class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em]">Count</p>
                        <p id="stat-count" class="text-4xl font-black text-emerald-900 mt-1">0 / 0</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button id="pdf-btn" class="bg-emerald-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg btn-hover flex items-center justify-center gap-2">
                        <i data-lucide="file-text"></i> 匯出 PDF
                    </button>
                    <button id="excel-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg btn-hover flex items-center justify-center gap-2">
                        <i data-lucide="file-spreadsheet"></i> 匯出 Excel
                    </button>
                </div>
            </div>

            <section class="space-y-4">
                <h3 class="font-black text-slate-800 flex items-center px-2 text-lg"><i data-lucide="check-square" class="mr-2 text-blue-600"></i> 出席簽到區</h3>
                <div id="attendees-container" class="grid gap-3"></div>
            </section>

            <section class="space-y-4 pt-4 border-t border-dashed border-slate-200">
                <div class="flex items-center justify-between px-2">
                    <h3 class="font-black text-slate-800 flex items-center text-lg"><i data-lucide="user-plus" class="mr-2 text-orange-500"></i> 列席人員區</h3>
                    <button id="guest-sign-btn" class="bg-orange-100 text-orange-600 text-sm font-black px-5 py-2 rounded-full hover:bg-orange-200 btn-hover">臨時簽到</button>
                </div>
                <div id="observers-container" class="grid gap-3"></div>
            </section>
        </div>

        <!-- 活動報名視圖 (優化返回) -->
        <div id="registration-view" class="space-y-6 hidden-view animate-in zoom-in duration-300">
            <div class="bg-white rounded-[3rem] shadow-xl border border-slate-200 p-8 text-center relative overflow-hidden">
                <button onclick="showUI('list')" class="absolute top-6 right-6 p-2 bg-slate-100 text-slate-400 rounded-full hover:bg-slate-200 transition-colors">
                    <i data-lucide="x" size="24"></i>
                </button>
                <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="calendar-plus" size="40"></i>
                </div>
                <h2 id="reg-meeting-title" class="text-3xl font-black text-slate-800 mb-2 leading-tight"></h2>
                <p id="reg-meeting-info" class="text-slate-500 font-bold mb-8"></p>
                <div id="reg-status-container" class="mb-8 hidden">
                    <div class="p-4 bg-red-50 text-red-600 rounded-3xl border border-red-100 font-bold" id="reg-status-msg"></div>
                </div>
                <form id="reg-form" class="space-y-4 text-left max-w-sm mx-auto">
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-4 uppercase tracking-widest">職稱</label>
                        <select id="reg-title" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-orange-500">
                            <option value="藥師">藥師</option><option value="主任">主任</option><option value="組長">組長</option><option value="實習藥師">實習藥師</option><option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-4 uppercase tracking-widest">真實姓名</label>
                        <input id="reg-name" required placeholder="請輸入姓名" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-orange-500 shadow-inner" />
                    </div>
                    <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg btn-hover mt-4">立即報名活動</button>
                    <button type="button" onclick="showUI('list')" class="w-full text-slate-400 font-bold py-2 mt-2">取消並返回</button>
                </form>
                <div id="reg-success" class="hidden py-10 animate-in fade-in">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" size="32"></i></div>
                    <h3 class="text-2xl font-black text-slate-800 mb-2 font-bold">報名成功！</h3>
                    <p class="text-slate-500 font-bold mb-8">您的資料已列入活動名單。</p>
                    <button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">確定</button>
                </div>
            </div>
        </div>

        <!-- 名單管理 -->
        <div id="admin-view" class="space-y-6 hidden-view animate-in slide-in-from-bottom duration-300">
            <div class="flex items-center justify-between px-2">
               <h2 class="text-xl font-black text-slate-800 tracking-tight">會議名單維護</h2>
               <button id="admin-done-btn" class="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl font-black btn-hover">完成</button>
           </div>
           <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-4">
               <textarea id="batch-names-input" placeholder="職稱-姓名 (用逗點隔開)" class="w-full p-4 h-24 rounded-2xl border bg-slate-50 outline-none text-sm focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
               <div class="grid grid-cols-2 gap-3">
                   <button id="batch-add-btn" class="bg-blue-700 text-white py-4 rounded-2xl font-black btn-hover">加入人員</button>
                   <button id="clear-all-attendees-btn" class="bg-red-50 text-red-600 py-4 rounded-2xl font-black border border-red-100 btn-hover">清空名單</button>
               </div>
           </div>
           <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
               <div id="admin-attendees-list"></div>
           </div>
       </div>

       <!-- 群組管理 -->
       <div id="groups-view" class="space-y-6 hidden-view animate-in slide-in-from-right duration-300">
           <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
               <h2 id="group-form-title" class="text-2xl font-black mb-6 flex items-center text-slate-800"><i data-lucide="users" class="mr-3 text-blue-600"></i> 設定常用名單</h2>
               <div class="space-y-4">
                   <input id="new-group-name" placeholder="群組名稱" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold" />
                   <textarea id="new-group-members" placeholder="職稱-姓名 (用逗點分隔)" class="w-full p-4 h-32 rounded-2xl border bg-slate-50 outline-none text-sm"></textarea>
                   <div class="flex gap-2">
                       <button id="save-group-btn" class="flex-[2] bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg btn-hover">儲存常用資料</button>
                       <button id="cancel-group-edit-btn" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black hidden">取消</button>
                   </div>
               </div>
           </div>
           <div id="groups-container" class="space-y-3"></div>
       </div>
    </main>

    <!-- Modals -->
    <div id="add-meeting-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden-view">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 shadow-2xl animate-in zoom-in duration-300 overflow-y-auto max-h-[90vh]">
            <h2 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 text-center tracking-tighter">活動資訊設定</h2>
            <div class="space-y-4">
                <input id="m-title" placeholder="活動主題名稱" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-blue-500" />
                <div class="grid grid-cols-2 gap-4">
                    <input id="m-date" type="date" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-black" />
                    <select id="m-time" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-black"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="m-chairman" placeholder="主席姓名" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold" />
                    <input id="m-location" value="藥劑科會議室" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold text-blue-600" />
                </div>
                <div class="p-5 bg-blue-50 rounded-3xl space-y-3">
                    <h4 class="text-xs font-black text-blue-600 uppercase flex items-center"><i data-lucide="clock" class="mr-1" size="14"></i> 簽到開放時間</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="m-sign-start" type="time" class="p-3 rounded-xl border bg-white font-bold" />
                        <input id="m-sign-end" type="time" class="p-3 rounded-xl border bg-white font-bold" />
                    </div>
                </div>
                <div class="p-5 bg-orange-50 rounded-3xl space-y-3">
                    <h4 class="text-xs font-black text-orange-600 uppercase flex items-center"><i data-lucide="calendar-plus" class="mr-1" size="14"></i> 報名開放期間</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="m-reg-start" type="date" class="w-full p-3 rounded-xl border bg-white font-bold" />
                        <input id="m-reg-end" type="date" class="w-full p-3 rounded-xl border bg-white font-bold" />
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button id="close-add-modal-btn" class="flex-1 py-4 border-2 rounded-2xl font-black text-slate-400">取消</button>
                    <button id="confirm-add-meeting-btn" class="flex-[2] bg-blue-700 text-white py-4 rounded-2xl font-black shadow-xl">儲存並建立</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽名板 Modal (專為手機橫向佈局優化) -->
    <div id="signature-modal" class="hidden-view">
        <div class="sig-modal-content">
            <!-- 手機直向鎖定畫面 -->
            <div class="portrait-warning bg-blue-900 text-white flex-1 flex flex-col items-center justify-center p-10 text-center">
                <div class="animate-bounce mb-6"><i data-lucide="rotate-cw" size="64"></i></div>
                <h3 class="text-3xl font-black mb-4 tracking-tighter">請將手機轉為橫向</h3>
                <p class="text-lg opacity-80 font-bold leading-relaxed">為了確保簽名精準度與按鈕顯示，<br>請將手機轉為「橫向」。</p>
                <button onclick="closeSign()" class="mt-10 px-8 py-3 border-2 border-white/40 rounded-full font-black text-sm">取消簽到</button>
            </div>

            <!-- 橫向模式主體 (左右並排佈局) -->
            <div class="landscape-content flex-1 flex flex-col h-full bg-slate-50">
                <div class="sig-header-info flex items-center justify-between p-4 bg-white border-b shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-xs uppercase tracking-widest">Signature</div>
                        <h2 class="text-lg font-black text-slate-800"><span id="sig-name" class="underline decoration-blue-300"></span> <span id="sig-title-label" class="text-slate-400 text-sm ml-1 font-bold"></span></h2>
                    </div>
                    <button onclick="closeSign()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-transform"><i data-lucide="x" size="20"></i></button>
                </div>
                
                <div id="sig-observer-fields" class="p-3 bg-blue-50 border-b hidden-view">
                    <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
                        <input id="sig-obs-name" placeholder="姓名" class="p-2.5 rounded-xl border-2 border-white outline-none font-bold text-sm shadow-sm focus:border-blue-400" />
                        <input id="sig-obs-dept" placeholder="單位/科別" class="p-2.5 rounded-xl border-2 border-white outline-none font-bold text-sm shadow-sm focus:border-blue-400" />
                    </div>
                </div>

                <div class="flex-1 flex sig-layout overflow-hidden">
                    <!-- 左側畫板 -->
                    <div class="flex-1 p-3 flex flex-col sig-main-area">
                        <div id="canvas-wrapper" class="flex-1 bg-white rounded-3xl border-4 border-dashed border-slate-200 relative overflow-hidden flex flex-col shadow-inner">
                            <canvas id="signature-canvas" class="signature-pad-canvas"></canvas>
                        </div>
                    </div>
                    
                    <!-- 右側固定按鈕區 -->
                    <div class="sig-side-bar bg-white flex flex-row md:flex-col justify-center gap-3 p-4 border-l">
                        <button id="clear-sig-btn" class="flex-1 md:flex-none py-5 px-6 border-2 border-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-50 transition-colors">清除重簽</button>
                        <button id="save-sig-btn" class="flex-[2] md:flex-none py-5 px-6 bg-blue-800 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">確認送出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4 hidden-view">
        <div class="bg-white p-8 rounded-[3rem] text-center max-w-sm w-full shadow-2xl animate-in zoom-in duration-300">
            <h3 id="qr-meeting-title" class="text-xl font-black mb-2 text-slate-800 tracking-tighter"></h3>
            <p id="qr-type-label" class="text-xs text-slate-400 mb-6 font-black uppercase tracking-widest"></p>
            <div id="qrcode-container" class="bg-white p-4 border-8 border-slate-50 rounded-[2rem] inline-block mb-8 shadow-inner"></div>
            <button id="close-qr-modal-btn" class="w-full bg-slate-100 py-4 rounded-2xl font-black text-slate-600 hover:bg-slate-200">關閉視窗</button>
        </div>
    </div>

    <!-- Script (Firebase 邏輯與修復) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDiimflWIVYlQ7YX27cX7KzFhF_nAG2OcY",
            authDomain: "fyh-pharmacy-v2.firebaseapp.com",

        // 核心修正：座標位移對齊
        function calibrateCanvas() {
            if (document.getElementById('signature-modal').classList.contains('hidden-view')) return;
            const canvas = document.getElementById('signature-canvas');
            const wrapper = document.getElementById('canvas-wrapper');
            if (!wrapper || !canvas) return;

            const rect = wrapper.getBoundingClientRect();
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            
            // 重要：同步 CSS 物理尺寸與 Canvas 屬性尺寸
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            
            const ctx = canvas.getContext("2d");
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(ratio, ratio);
            
            signaturePad.clear();
        }

        async function exportPDF() {
            const b = document.getElementById('pdf-btn'); b.disabled = true; b.innerHTML = '生成中...';
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const all = [...attendees.sort((a,b)=>(a.order||0)-(b.order||0)).map(p => ({ title: p.title, name: p.name, signature: p.signature, note: p.status === 'duty'?'值班':p.status==='vacation'?'休假':p.status==='leave'?'請假':'' })), ...observers.map(o => ({ title: '列席', name: o.name, signature: o.signature, note: o.department }))];
            const per = 11, pages = Math.ceil(all.length / per) || 1;
            for (let i = 0; i < pages; i++) {
                if (i > 0) pdf.addPage();
                const h = document.getElementById('pdf-page-template');
                document.getElementById('pdf-header-title').textContent = currentMeeting.title;
                document.getElementById('pdf-header-time').textContent = "時間：" + currentMeeting.date + " " + currentMeeting.time;
                document.getElementById('pdf-header-location').textContent = "地點：" + currentMeeting.location;
                document.getElementById('pdf-header-chairman').textContent = "主席：" + (currentMeeting.chairman || '');
                const body = h.querySelector('.pdf-table-body'); body.innerHTML = '';
                const end = Math.min((i+1)*per, all.length);
                for (let j = i*per; j < end; j++) {
                    const p = all[j]; const tr = document.createElement('tr'); tr.className = "h-[50px]";
                    tr.innerHTML = `<td class="p-3 text-sm border border-black">${p.title}</td><td class="p-3 text-xl font-bold border border-black text-black">${p.name}</td><td class="p-2 border border-black">${p.signature ? `<img src="${p.signature}" style="max-height:48px; width:120px; margin:auto;">` : ''}</td><td class="p-3 text-sm text-slate-500 border border-black">${p.note}</td>`;
                    body.appendChild(tr);
                }
                const f = h.querySelector('.pdf-footer-stats');
                if (i === pages - 1) {
                    const ok = attendees.filter(a => a.status === 'present').length;
                    f.classList.remove('hidden'); f.innerHTML = `出席率：${Math.round((ok/attendees.length)*100)}% (${ok}/${attendees.length})`;
                } else f.classList.add('hidden');
                const canvas = await html2canvas(h, { scale: 2.5, useCORS: true });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.85), 'JPEG', 0, 0, 210, (canvas.height*210)/canvas.width);
            }
            pdf.save(`簽到單_${currentMeeting.title}.pdf`); b.disabled = false; b.innerHTML = '<i data-lucide="file-text"></i> 匯出報表 (PDF)'; lucide.createIcons();
        }

        function exportExcel() {
            const rows = [["豐原醫院 簽到表"], ["活動", currentMeeting.title], ["時間", currentMeeting.date], ["名單"]];
            attendees.sort((a,b)=>(a.order||0)-(b.order||0)).forEach(p => rows.push([p.title, p.name, p.status==='present'?"出席":p.status, p.signedAt||'']));
            const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `${currentMeeting.title}.xlsx`);
        }

        function renderAdminList() {
            const c = document.getElementById('admin-attendees-list'); c.innerHTML = ''; const sorted = attendees.sort((a,b)=>(a.order||0)-(b.order||0));
            sorted.forEach((p, idx) => {
                const div = document.createElement('div'); div.className = "p-4 border-b last:border-0 flex justify-between items-center bg-white";
                div.innerHTML = `<div class="flex items-center gap-4"><div class="flex flex-col"><button onclick="window.moveAtt('${p.id}',-1)" class="text-blue-500"><i data-lucide="chevron-up" size="18"></i></button><button onclick="window.moveAtt('${p.id}',1)" class="text-blue-500"><i data-lucide="chevron-down" size="18"></i></button></div><span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-black tracking-tighter">${p.title}</span><span class="font-black text-slate-700 text-lg">${p.name}</span></div><button class="text-red-300" onclick="window.delAtt('${p.id}')"><i data-lucide="trash-2" size="20"></i></button>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }
        window.moveAtt = async (id, dir) => {
            const s = attendees.sort((a,b)=>(a.order||0)-(b.order||0)); const i = s.findIndex(x => x.id === id); if (i===-1||(i+dir<0)||(i+dir>=s.length)) return;
            const a = s[i], b = s[i+dir]; await updateDoc(doc(db, `fyh_attendees_${currentMeeting.id}`, a.id), { order: b.order || 0 }); await updateDoc(doc(db, `fyh_attendees_${currentMeeting.id}`, b.id), { order: a.order || 0 });
        };
        window.delAtt = async (id) => { if(confirm("移除人員？")) await deleteDoc(doc(db, `fyh_attendees_${currentMeeting.id}`, id)); };

        function renderGroups() {
            const c = document.getElementById('groups-container'); c.innerHTML = '';
            groups.forEach(g => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm";
                div.innerHTML = `<div class="flex-1"><h4 class="font-black text-slate-800 text-lg">${g.name}</h4><p class="text-xs text-slate-400 mt-1 truncate">${g.members.join(', ')}</p></div><div class="flex gap-2"><button class="p-3 text-blue-500 bg-blue-50 rounded-2xl" onclick="window.editGrp('${g.id}')"><i data-lucide="edit-3" size="20"></i></button><button class="p-3 text-red-400 bg-red-50 rounded-2xl" onclick="window.delGrp('${g.id}')"><i data-lucide="trash-2" size="20"></i></button></div>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }

        window.editGrp = (id) => {
            const g = groups.find(x => x.id === id); if (!g) return; editingGroupId = id;
            document.getElementById('new-group-name').value = g.name; document.getElementById('new-group-members').value = g.members.join(', ');
            document.getElementById('group-form-title').innerHTML = '<i data-lucide="edit-3" class="mr-2 text-blue-600"></i> 編輯模式';
            document.getElementById('save-group-btn').textContent = '更新設定'; document.getElementById('cancel-group-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' }); lucide.createIcons();
        };

        window.delGrp = async (id) => { if(checkPass() && confirm("確定刪除群組？")) await deleteDoc(doc(db, 'fyh_groups', id)); };
    </script>
</body>
</html>
