<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>醫院會議與活動管理系統 - 豐原醫院</title>
    
    <!-- 資源載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* 自定義美化捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 簽名板樣式 */
        #signature-modal {
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sig-modal-content {
            height: 100dvh;
            width: 100vw;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .signature-pad-canvas {
            touch-action: none !important;
            cursor: crosshair;
            background-color: #ffffff;
            width: 100% !important;
            height: 100% !important;
            display: block;
            -webkit-touch-callout: none;
        }

        /* 橫向模式佈局 */
        @media (orientation: landscape) {
            .sig-layout { flex-direction: row !important; height: 100%; }
            .sig-main-area { flex: 1 !important; height: 100% !important; padding: 0.5rem !important; }
            .sig-side-bar {
                width: 140px !important;
                height: 100% !important;
                border-left: 1px solid #e2e8f0;
                display: flex !important;
                flex-direction: column !important;
                padding: 0.75rem !important;
                justify-content: center !important;
                gap: 0.5rem !important;
                background: #fff;
            }
            .sig-header-info { padding: 0.5rem 1rem !important; height: auto !important; border-bottom: 1px solid #e2e8f0; }
            .portrait-warning { display: none !important; }
            .landscape-content { display: flex !important; flex: 1; flex-direction: column; }
        }

        @media (orientation: portrait) {
            .portrait-warning { display: flex !important; flex: 1; }
            .landscape-content { display: none !important; }
        }

        .lock-scroll {
            overflow: hidden !important;
            height: 100vh !important;
            position: fixed !important;
            width: 100% !important;
        }

        #pdf-export-container { position: absolute; left: -9999px; top: 0; z-index: -1; background: white; }
        .hidden-view { display: none !important; }
        
        .btn-hover { transition: all 0.2s ease; }
        .btn-hover:active { transform: scale(0.95); }

        .scroll-hint { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-blue-800 text-white shadow-lg p-4 sticky top-0 z-40">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <button id="back-btn" onclick="window.showUI('list')" class="p-1 hover:bg-blue-900 rounded transition-colors hidden">
                    <i data-lucide="arrow-left"></i>
                </button>
                <h1 class="text-xl font-bold tracking-widest">會議與報名系統</h1>
            </div>
            <div id="header-actions" class="flex items-center space-x-3">
                <button id="nav-groups-btn" class="bg-blue-900 p-2 rounded-full hover:bg-blue-950" title="管理群組">
                    <i data-lucide="users"></i>
                </button>
                <button id="open-add-meeting-btn" class="bg-white text-blue-800 p-2 rounded-full shadow-lg hover:bg-blue-50" title="建立新活動">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <div id="loading-view" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin text-blue-600 mb-4"><i data-lucide="loader-2" size="48"></i></div>
            <p class="text-slate-500 font-bold tracking-widest">系統連線中...</p>
        </div>

        <!-- 會議列表 -->
        <div id="list-view" class="space-y-4 mt-2 hidden-view animate-in fade-in duration-300">
            <div id="meetings-container" class="space-y-4"></div>
        </div>

        <!-- 會議詳情 -->
        <div id="detail-view" class="space-y-6 hidden-view animate-in slide-in-from-right duration-300">
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 overflow-hidden relative">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                    <div class="flex-1">
                        <div class="flex items-start gap-2">
                            <h2 id="detail-title" class="text-2xl font-black text-slate-800 leading-tight"></h2>
                            <button id="main-edit-btn" class="mt-1 p-1.5 text-slate-300 hover:text-blue-600 transition-colors">
                                <i data-lucide="settings" size="18"></i>
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3 font-bold text-sm">
                            <span id="detail-date" class="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full shadow-sm"></span>
                            <span id="detail-time" class="bg-slate-100 px-4 py-1.5 rounded-full text-slate-600"></span>
                            <span id="detail-location" class="bg-slate-100 px-4 py-1.5 rounded-full text-slate-600"></span>
                        </div>
                        <div class="mt-4 p-3 bg-red-50 border border-red-100 rounded-2xl hidden" id="sign-time-warning">
                            <p class="text-red-600 text-xs font-bold flex items-center">
                                <i data-lucide="clock" class="mr-1" size="14"></i> 
                                非開放時間 (<span id="allowed-sign-range"></span>)
                            </p>
                        </div>
                        <div class="mt-5 flex items-center gap-2 bg-slate-50 w-fit px-3 py-1 rounded-xl">
                            <span class="text-slate-500 text-xs font-bold uppercase tracking-wider">主席</span>
                            <span id="detail-chairman" class="font-black text-slate-800"></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="show-qr-btn" class="bg-slate-100 p-3 rounded-2xl hover:bg-slate-200 btn-hover" title="簽到 QR"><i data-lucide="qr-code"></i></button>
                        <button id="show-reg-qr-btn" class="bg-orange-50 text-orange-600 p-3 rounded-2xl hover:bg-orange-100 btn-hover" title="報名 QR"><i data-lucide="user-plus"></i></button>
                        <button id="direct-reg-btn" class="bg-orange-600 text-white px-4 py-2 rounded-2xl font-black hover:bg-orange-700 text-sm">報名</button>
                        <button id="nav-admin-btn" class="bg-slate-900 text-white px-4 py-2 rounded-2xl font-black hover:bg-black btn-hover text-sm">管理人員</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                    <div class="bg-gradient-to-br from-blue-50 to-white p-5 rounded-3xl border border-blue-100 shadow-sm">
                        <p class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em]">Attendance Rate</p>
                        <p id="stat-rate" class="text-4xl font-black text-blue-900 mt-1">0%</p>
                    </div>
                    <div class="bg-gradient-to-br from-emerald-50 to-white p-5 rounded-3xl border border-emerald-100 shadow-sm">
                        <p class="text-[10px] text-emerald-600 font-black uppercase tracking-[0.2em]">Count</p>
                        <p id="stat-count" class="text-4xl font-black text-emerald-900 mt-1">0 / 0</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button id="pdf-btn" class="bg-emerald-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg btn-hover flex items-center justify-center gap-2">
                        <i data-lucide="file-text"></i> 匯出 PDF
                    </button>
                    <button id="excel-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg btn-hover flex items-center justify-center gap-2">
                        <i data-lucide="file-spreadsheet"></i> 匯出 Excel
                    </button>
                </div>
            </div>

            <section class="space-y-4">
                <h3 class="font-black text-slate-800 flex items-center px-2 text-lg"><i data-lucide="check-square" class="mr-2 text-blue-600"></i> 出席簽到區</h3>
                <div id="attendees-container" class="grid gap-3"></div>
            </section>

            <section class="space-y-4 pt-4 border-t border-dashed border-slate-200">
                <div class="flex items-center justify-between px-2">
                    <h3 class="font-black text-slate-800 flex items-center text-lg"><i data-lucide="user-plus" class="mr-2 text-orange-500"></i> 列席人員區</h3>
                    <button id="guest-sign-btn" class="bg-orange-100 text-orange-600 text-sm font-black px-5 py-2 rounded-full hover:bg-orange-200 btn-hover">臨時簽到</button>
                </div>
                <div id="observers-container" class="grid gap-3"></div>
            </section>
        </div>

        <!-- 活動報名視圖 -->
        <div id="registration-view" class="space-y-6 hidden-view animate-in zoom-in duration-300">
            <div class="bg-white rounded-[3rem] shadow-xl border border-slate-200 p-8 text-center relative overflow-hidden">
                <button onclick="window.showUI('list')" class="absolute top-6 right-6 p-2 bg-slate-100 text-slate-400 rounded-full hover:bg-slate-200 transition-colors">
                    <i data-lucide="x" size="24"></i>
                </button>
                <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="calendar-plus" size="40"></i>
                </div>
                <h2 id="reg-meeting-title" class="text-3xl font-black text-slate-800 mb-2 leading-tight"></h2>
                <p id="reg-meeting-info" class="text-slate-500 font-bold mb-8"></p>
                <div id="reg-status-container" class="mb-8 hidden">
                    <div class="p-4 bg-red-50 text-red-600 rounded-3xl border border-red-100 font-bold" id="reg-status-msg"></div>
                </div>
                <form id="reg-form" class="space-y-4 text-left max-w-sm mx-auto">
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-4 uppercase tracking-widest">職稱</label>
                        <select id="reg-title" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-orange-500">
                            <option value="藥師">藥師</option><option value="主任">主任</option><option value="組長">組長</option><option value="實習藥師">實習藥師</option><option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-4 uppercase tracking-widest">姓名</label>
                        <input id="reg-name" required placeholder="請輸入姓名" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-orange-500 shadow-inner" />
                    </div>
                    <button type="submit" class="w-full bg-orange-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-lg btn-hover mt-4">立即報名活動</button>
                    <button type="button" onclick="window.showUI('list')" class="w-full text-slate-400 font-bold py-2 mt-2">取消並返回</button>
                </form>
                <div id="reg-success" class="hidden py-10 animate-in fade-in">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" size="32"></i></div>
                    <h3 class="text-2xl font-black text-slate-800 mb-2 font-bold">報名成功！</h3>
                    <p class="text-slate-500 font-bold">資料已同步至活動名單。</p>
                    <button onclick="location.reload()" class="mt-8 bg-blue-600 text-white px-10 py-4 rounded-full font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">確定</button>
                </div>
            </div>
        </div>

        <!-- 名單管理 -->
        <div id="admin-view" class="space-y-6 hidden-view animate-in slide-in-from-bottom duration-300">
            <div class="flex items-center justify-between px-2">
               <h2 class="text-xl font-black text-slate-800 tracking-tight">會議名單維護</h2>
               <button id="admin-done-btn" class="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl font-black btn-hover">完成</button>
           </div>
           
           <div class="bg-blue-50 p-5 rounded-3xl border-2 border-dashed border-blue-200">
               <h4 class="text-[10px] font-black text-blue-500 mb-3 uppercase tracking-widest text-center">從常用群組快速匯入</h4>
               <div id="group-import-container" class="flex flex-wrap gap-2 justify-center"></div>
           </div>

           <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-4">
               <textarea id="batch-names-input" placeholder="職稱-姓名 (用逗點或換行區隔)" class="w-full p-4 h-24 rounded-2xl border bg-slate-50 outline-none text-sm focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
               <div class="grid grid-cols-2 gap-3">
                   <button id="batch-add-btn" class="bg-blue-700 text-white py-4 rounded-2xl font-black btn-hover">加入人員</button>
                   <button id="clear-all-attendees-btn" class="bg-red-50 text-red-600 py-4 rounded-2xl font-black border border-red-100 btn-hover">清空名單</button>
               </div>
           </div>

           <!-- 名單固定高度捲軸區 -->
           <div class="bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col max-h-[450px]">
               <div class="bg-slate-50 p-3 text-[10px] font-black text-slate-400 border-b uppercase tracking-widest text-center">目前名單 (可調整順序)</div>
               <div id="admin-attendees-list" class="flex-1 overflow-y-auto custom-scrollbar p-1"></div>
           </div>
       </div>

       <!-- 群組管理 -->
       <div id="groups-view" class="space-y-6 hidden-view animate-in slide-in-from-right duration-300">
           <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
               <h2 id="group-form-title" class="text-2xl font-black mb-6 flex items-center text-slate-800"><i data-lucide="users" class="mr-3 text-blue-600"></i> 設定常用名單</h2>
               <div class="space-y-4">
                   <input id="new-group-name" placeholder="群組名稱" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-blue-500" />
                   <textarea id="new-group-members" placeholder="職稱-姓名 (用逗點分隔)" class="w-full p-4 h-32 rounded-2xl border bg-slate-50 outline-none text-sm font-medium"></textarea>
                   <div class="flex gap-2">
                       <button id="save-group-btn" class="flex-[2] bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg btn-hover">儲存常用資料</button>
                       <button id="cancel-group-edit-btn" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black hidden text-sm">取消</button>
                   </div>
               </div>
           </div>
           <!-- 群組列表捲軸區 -->
           <div id="groups-container" class="space-y-3 max-h-[350px] overflow-y-auto custom-scrollbar pr-1"></div>
       </div>
    </main>

    <!-- Modals -->
    <div id="add-meeting-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden-view">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 shadow-2xl animate-in zoom-in duration-200 overflow-y-auto max-h-[90vh]">
            <h2 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 text-center tracking-tighter">活動資訊設定</h2>
            <div class="space-y-4">
                <input id="m-title" placeholder="活動主題名稱" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold focus:ring-2 focus:ring-blue-500" />
                <div class="grid grid-cols-2 gap-4">
                    <input id="m-date" type="date" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-black" />
                    <select id="m-time" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-black"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="m-chairman" placeholder="主席姓名" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold" />
                    <input id="m-location" value="藥劑科會議室" class="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold text-blue-600" />
                </div>
                <div class="p-5 bg-blue-50 rounded-3xl space-y-3 text-black">
                    <h4 class="text-xs font-black text-blue-600 uppercase flex items-center"><i data-lucide="clock" class="mr-1" size="14"></i> 簽到開放時間</h4>
                    <div class="grid grid-cols-2 gap-3 text-black">
                        <input id="m-sign-start" type="time" class="p-3 rounded-xl border bg-white font-bold text-black" />
                        <input id="m-sign-end" type="time" class="p-3 rounded-xl border bg-white font-bold text-black" />
                    </div>
                </div>
                <div class="p-5 bg-orange-50 rounded-3xl space-y-3 text-black">
                    <h4 class="text-xs font-black text-orange-600 uppercase flex items-center"><i data-lucide="calendar-plus" class="mr-1" size="14"></i> 報名開放期間</h4>
                    <div class="grid grid-cols-2 gap-3 text-black">
                        <input id="m-reg-start" type="date" class="w-full p-3 rounded-xl border bg-white font-bold text-black" />
                        <input id="m-reg-end" type="date" class="w-full p-3 rounded-xl border bg-white font-bold text-black" />
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button id="close-add-modal-btn" class="flex-1 py-4 border-2 rounded-2xl font-black text-slate-400">取消</button>
                    <button id="confirm-add-meeting-btn" class="flex-[2] bg-blue-700 text-white py-4 rounded-2xl font-black shadow-xl">儲存設定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 簽名板 Modal (專為橫向優化與座標修正) -->
    <div id="signature-modal" class="hidden-view">
        <div class="sig-modal-content">
            <div class="portrait-warning bg-blue-900 text-white flex-1 flex flex-col items-center justify-center p-10 text-center">
                <div class="animate-bounce mb-6"><i data-lucide="rotate-cw" size="64"></i></div>
                <h3 class="text-3xl font-black mb-4 tracking-tighter">請將手機轉為橫向</h3>
                <p class="text-lg opacity-80 font-bold leading-relaxed">為了確保簽名品質與縮放精準，<br>請將手機轉為「橫向」。</p>
                <button onclick="window.closeSign()" class="mt-10 px-8 py-3 border-2 border-white/30 rounded-full font-black text-sm">取消簽到</button>
            </div>

            <div class="landscape-content flex-1 flex flex-col h-full bg-slate-50">
                <div class="sig-header-info flex items-center justify-between p-4 bg-white border-b shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-xs uppercase tracking-widest">Signature</div>
                        <h2 class="text-lg font-black text-slate-800"><span id="sig-name" class="underline decoration-blue-300"></span> <span id="sig-title-label" class="text-slate-400 text-sm ml-1 font-bold"></span></h2>
                    </div>
                    <button onclick="window.closeSign()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-transform"><i data-lucide="x" size="20"></i></button>
                </div>
                
                <div id="sig-observer-fields" class="p-3 bg-blue-50 border-b hidden-view">
                    <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
                        <input id="sig-obs-name" placeholder="姓名" class="p-2.5 rounded-xl border-2 border-white outline-none font-bold text-sm shadow-sm" />
                        <input id="sig-obs-dept" placeholder="單位/科別" class="p-2.5 rounded-xl border-2 border-white outline-none font-bold text-sm shadow-sm" />
                    </div>
                </div>

                <div class="flex-1 flex sig-layout overflow-hidden">
                    <div class="flex-1 p-3 flex flex-col sig-main-area">
                        <div id="canvas-wrapper" class="flex-1 bg-white rounded-3xl border-4 border-dashed border-slate-200 relative overflow-hidden flex flex-col shadow-inner">
                            <canvas id="signature-canvas" class="signature-pad-canvas"></canvas>
                        </div>
                    </div>
                    <div class="sig-side-bar bg-white flex flex-row md:flex-col justify-center gap-3 p-4 border-l">
                        <button id="clear-sig-btn" class="flex-1 md:flex-none py-5 px-6 border-2 border-slate-100 rounded-2xl font-black text-slate-400 hover:bg-slate-50 transition-colors">清除重簽</button>
                        <button id="save-sig-btn" class="flex-[2] md:flex-none py-5 px-6 bg-blue-800 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">確認送出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="fixed inset-0 z-[100] bg-black/80 flex items-center justify-center p-4 hidden-view">
        <div class="bg-white p-8 rounded-[3rem] text-center max-w-sm w-full shadow-2xl animate-in zoom-in duration-300">
            <h3 id="qr-meeting-title" class="text-xl font-black mb-2 text-slate-800 tracking-tighter"></h3>
            <p id="qr-type-label" class="text-xs text-slate-400 mb-6 font-black uppercase tracking-widest"></p>

        </div>

    <!-- PDF Template -->
    <div id="pdf-export-container">

                <h2 id="pdf-header-title-inner" class="text-3xl font-bold mt-4 text-black"></h2>
                <h3 class="text-2xl font-bold mt-2 text-black tracking-widest">簽到單</h3>
                
                <div class="text-left text-xl font-bold mt-10 space-y-4 px-4 text-black font-black">
                    <p id="pdf-header-time-inner"></p>
                    <p id="pdf-header-location-inner"></p>

            <!-- 頁碼區 -->
            <div class="mt-12 flex justify-between items-center text-sm font-bold italic text-black border-t border-black pt-4">

            </div>

    <!-- Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, updateDoc, addDoc, deleteDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDiimflWIVYlQ7YX27cX7KzFhF_nAG2OcY",
            authDomain: "fyh-pharmacy-v2.firebaseapp.com",
            databaseURL: "https://fyh-pharmacy-v2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fyh-pharmacy-v2",
            storageBucket: "fyh-pharmacy-v2.firebasestorage.app",
            messagingSenderId: "965995209196",
            appId: "1:965995209196:web:e037c9ccf61d5cdeb6e0c9",
            measurementId: "G-RM379DM93Q"
        };
        const ADMIN_PASS = "8888";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'fyh-pharmacy-v2';

        let meetings = [], attendees = [], observers = [], groups = [];
        let currentMeeting = null, signaturePad = null, activeSignPerson = null, editingGroupId = null;
        let isEditingMeeting = false;

        // 全域 showUI 函式
        window.showUI = (v) => {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden-view'));
            document.getElementById(`${v}-view`).classList.remove('hidden-view');
            const isReg = (v === 'registration');
            document.getElementById('back-btn').classList.toggle('hidden', v === 'list' || isReg);
            document.getElementById('header-actions').classList.toggle('hidden', v !== 'list');
            lucide.createIcons(); window.scrollTo(0,0);
        };

        const checkPass = () => {
            const p = prompt("管理密碼：");
            if (p === ADMIN_PASS) return true;
            if (p !== null) alert("密碼錯誤！");
            return false;
        };

        window.onload = () => {
            lucide.createIcons();
            initTimeSlots();
            initSignaturePad();
            bindEventListeners();
            
            setTimeout(() => {
                const lv = document.getElementById('loading-view');
                if (lv && !lv.classList.contains('hidden-view')) {
                    lv.classList.add('hidden-view');
                    if (!currentMeeting) window.showUI('list');
                }
            }, 5000);

            signInAnonymously(auth).then(() => startListeners()).catch(err => {
                document.getElementById('loading-view').innerHTML = '<p class="text-red-500 font-bold">連線失敗</p>';
            });

            window.addEventListener("orientationchange", () => {
                setTimeout(() => calibrateCanvas(), 800);
            });
        };

        function initTimeSlots() {
            const s = document.getElementById('m-time');
            for(let h=8; h<=20; h++) {
                const hh = h < 10 ? `0${h}` : h;
                ['00', '30'].forEach(m => {
                    const opt = document.createElement('option'); opt.value = `${hh}:${m}`; opt.textContent = `${hh}:${m}`; s.appendChild(opt);
                });
            }
        }

        function initSignaturePad() {
            const canvas = document.getElementById('signature-canvas');
            signaturePad = new SignaturePad(canvas, { 
                backgroundColor: 'rgb(255, 255, 255)', 
                penColor: 'rgb(0, 0, 0)', 
                minWidth: 2.5, 
                maxWidth: 4.8, 
                throttle: 16 
            });
        }

        function calibrateCanvas() {
            if (document.getElementById('signature-modal').classList.contains('hidden-view')) return;
            const canvas = document.getElementById('signature-canvas');
            const wrapper = document.getElementById('canvas-wrapper');
            if (!wrapper || !canvas) return;

            const rect = wrapper.getBoundingClientRect();
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            const ctx = canvas.getContext("2d");
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.scale(ratio, ratio);
            signaturePad.clear();
        }

        function startListeners() {
            // 重要：修正 Firestore 路徑至 artifacts 結構
            const meetingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'meetings');
            onSnapshot(meetingsRef, snapshot => {
                meetings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderMeetings();
                document.getElementById('loading-view').classList.add('hidden-view');
                const mid = new URLSearchParams(window.location.search).get('m'), reg = new URLSearchParams(window.location.search).get('reg');
                if (mid && !currentMeeting) { const m = meetings.find(x => x.id === mid); if (m) openMeeting(m); }
                else if (reg && !currentMeeting) { const m = meetings.find(x => x.id === reg); if (m) openReg(m); }
                else if (!currentMeeting && !reg) window.showUI('list');
            }, () => { window.showUI('list'); });

            const groupsRef = collection(db, 'artifacts', appId, 'public', 'data', 'groups');
            onSnapshot(groupsRef, snapshot => { 
                groups = snapshot.docs.map(d => ({ id: d.id, ...d.data() })); 
                renderGroups(); 
                if (!document.getElementById('admin-view').classList.contains('hidden-view')) renderImports();
            });
        }

        function startDetailListeners(mid) {
            const attRef = collection(db, 'artifacts', appId, 'public', 'data', `attendees_${mid}`);
            onSnapshot(attRef, snapshot => { attendees = snapshot.docs.map(d => ({ id: d.id, ...d.data() })); renderAttendees(); updateStats(); if (!document.getElementById('admin-view').classList.contains('hidden-view')) renderAdminList(); });
            
            const obsRef = collection(db, 'artifacts', appId, 'public', 'data', `observers_${mid}`);
            onSnapshot(obsRef, snapshot => { observers = snapshot.docs.map(d => ({ id: d.id, ...d.data() })); renderObservers(); });
            
            const meetDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'meetings', mid);
            onSnapshot(meetDocRef, d => { if (d.exists()) { currentMeeting = { id: d.id, ...d.data() }; updateHeader(); } });
        }

        function renderMeetings() {
            const c = document.getElementById('meetings-container'); c.innerHTML = meetings.length === 0 ? '<div class="py-20 text-center text-slate-300 font-bold">目前尚無活動</div>' : '';
            meetings.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)).forEach(m => {
                const div = document.createElement('div'); div.className = "bg-white rounded-3xl border border-slate-200 p-6 shadow-sm flex items-center justify-between";
                div.innerHTML = `<div class="flex-1 cursor-pointer" onclick="window.goM('${m.id}')"><h3 class="font-black text-xl text-slate-800 leading-tight">${m.title}</h3><div class="flex gap-4 text-[10px] mt-3 font-black text-slate-400 uppercase tracking-widest"><span class="flex items-center"><i data-lucide="calendar" size="12" class="mr-1"></i> ${m.date}</span><span class="flex items-center"><i data-lucide="map-pin" size="12" class="mr-1"></i> ${m.location}</span></div></div><div class="flex gap-2"><button onclick="window.goReg('${m.id}')" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl text-xs font-black shadow-sm active:scale-95 transition-all">報名</button><button class="p-2 text-slate-200 hover:text-red-500 transition-colors" onclick="window.delM('${m.id}')"><i data-lucide="trash-2" size="20"></i></button></div>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }
        window.goM = (id) => { const m = meetings.find(x => x.id === id); if(m) openMeeting(m); };
        window.goReg = (id) => { const m = meetings.find(x => x.id === id); if(m) openReg(m); };
        window.delM = async (id) => { if(checkPass() && confirm("確定刪除活動及名單？")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'meetings', id)); };

        function openMeeting(m) { currentMeeting = m; startDetailListeners(m.id); window.showUI('detail'); }
        function openReg(m) {
            currentMeeting = m; window.showUI('registration'); document.getElementById('reg-meeting-title').textContent = m.title;
            const active = (new Date().toISOString().split('T')[0] >= (m.regStart||"0000") && new Date().toISOString().split('T')[0] <= (m.regEnd||"9999"));
            document.getElementById('reg-status-container').classList.toggle('hidden', active);
            if (!active) document.getElementById('reg-status-msg').textContent = "報名期間已結束";
            document.getElementById('reg-form').classList.toggle('hidden', !active); document.getElementById('reg-success').classList.add('hidden');
        }

        function updateHeader() {
            document.getElementById('detail-title').textContent = currentMeeting.title; document.getElementById('detail-date').textContent = currentMeeting.date;
            document.getElementById('detail-time').textContent = currentMeeting.time; document.getElementById('detail-location').textContent = currentMeeting.location;
            document.getElementById('detail-chairman').textContent = currentMeeting.chairman || '(未設定)';
            const today = (new Date().getFullYear() + "-" + (new Date().getMonth() + 1).toString().padStart(2, '0') + "-" + new Date().getDate().toString().padStart(2, '0'));
            const active = today === currentMeeting.date;
            document.getElementById('sign-time-warning').classList.toggle('hidden', active);
            document.getElementById('allowed-sign-range').textContent = `${currentMeeting.signStart||"08:00"} ~ ${currentMeeting.signEnd||"17:30"}`;
        }

        function renderAttendees() {
            const c = document.getElementById('attendees-container'); c.innerHTML = '';
            attendees.sort((a,b) => (a.order||0)-(b.order||0)).forEach(p => {
                const ok = p.status === 'present';
                const div = document.createElement('div'); div.className = `bg-white p-5 rounded-3xl border-2 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-sm ${ok ? 'border-emerald-500 bg-emerald-50/10' : 'border-slate-100'}`;
                let act = ok ? 
                    `<div class="flex items-center gap-2"><img src="${p.signature}" class="h-12 w-32 object-contain bg-white rounded-lg p-1 border shadow-inner"><div class="flex flex-col gap-1"><button class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black" onclick="window.openSignPopup('attendee', '${p.id}')">重簽</button><button class="bg-red-50 text-red-600 px-3 py-1 rounded-lg text-[10px] font-black" onclick="window.cancelSign('${p.id}')">取消</button></div></div>` : 
                    `<div class="flex gap-2 items-center"><button class="bg-blue-700 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all" onclick="window.openSignPopup('attendee', '${p.id}')">簽名</button><select class="text-xs border-2 rounded-2xl px-2 py-3 bg-slate-50 font-black" onchange="window.setS('${p.id}', this.value)"><option value="none">--狀態--</option><option value="duty" ${p.status==='duty'?'selected':''}>值班</option><option value="vacation" ${p.status==='vacation'?'selected':''}>休假</option><option value="leave" ${p.status==='leave'?'selected':''}>請假</option></select><button onclick="window.delReg('${p.id}')" class="text-red-300 p-2 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="20"></i></button></div>`;
                div.innerHTML = `<div class="flex items-center space-x-4"><div class="w-12 h-12 rounded-2xl flex items-center justify-center ${ok?'bg-emerald-500 text-white shadow-lg':'bg-slate-100 text-slate-400'}"><i data-lucide="${ok?'check-circle-2':'user'}" size="24"></i></div><div><div class="flex items-center gap-2"><span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-black text-slate-500 tracking-tighter">${p.title}</span><p class="font-black text-slate-800 text-xl">${p.name}</p></div>${p.status!=='none'&&p.status!=='present'?`<span class="text-[11px] font-black text-white bg-red-500 px-2 py-0.5 rounded-full mt-1 inline-block">狀態：${p.status==='duty'?'值班':p.status==='vacation'?'休假':'請假'}</span>`:''}</div></div>${act}`;
                c.appendChild(div);
            }); lucide.createIcons();
        }

        window.delReg = async (id) => { if(confirm("移除人員？")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, id)); };
        window.cancelSign = async (id) => { if(confirm("取消簽到？將恢復為未簽狀態。")) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, id), { status: 'none', signed: false, signature: null, signedAt: null }); };

        function renderObservers() {
            const c = document.getElementById('observers-container'); c.innerHTML = observers.length === 0 ? '<div class="py-8 text-center text-slate-300 font-bold text-sm">目前無臨時列席</div>' : '';
            observers.forEach(o => {
                const div = document.createElement('div'); div.className = "bg-white p-5 rounded-3xl border flex items-center justify-between shadow-sm border-orange-100";
                div.innerHTML = `<div class="flex items-center space-x-3"><div class="w-10 h-10 rounded-xl bg-orange-500 text-white text-[10px] font-black flex items-center justify-center uppercase shadow-md shadow-orange-100">Guest</div><div><p class="font-black text-slate-800">${o.name}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${o.department}</p></div></div><div class="flex items-center gap-3"><img src="${o.signature}" class="h-12 w-32 object-contain bg-white rounded-lg p-1 border shadow-inner"><button onclick="window.delObs('${o.id}')" class="text-red-300 hover:text-red-500 p-2 transition-all active:scale-90"><i data-lucide="trash-2" size="20"></i></button></div>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }
        window.delObs = async (id) => { if(confirm("移除此列席人員？")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `observers_${currentMeeting.id}`, id)); };

        function updateStats() { const count = attendees.filter(a => a.status === 'present').length; const rate = attendees.length > 0 ? Math.round((count / attendees.length) * 100) : 0; document.getElementById('stat-rate').textContent = `${rate}%`; document.getElementById('stat-count').textContent = `${count} / ${attendees.length}`; }
        window.setS = async (id, s) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, id), { status: s, signed: s==='present', signature: null }); };

        window.openSignPopup = (type, id) => {
            activeSignPerson = { type, id }; document.body.classList.add('lock-scroll');
            document.getElementById('signature-modal').classList.remove('hidden-view');
            const obs = document.getElementById('sig-observer-fields');
            if (type === 'attendee') { const p = attendees.find(x => x.id === id); document.getElementById('sig-name').textContent = p.name; document.getElementById('sig-title-label').textContent = p.title; obs.classList.add('hidden-view'); }
            else { obs.classList.remove('hidden-view'); document.getElementById('sig-name').textContent = "臨時簽到"; document.getElementById('sig-title-label').textContent = ""; }
            setTimeout(() => calibrateCanvas(), 800);
        };
        window.closeSign = () => { document.getElementById('signature-modal').classList.add('hidden-view'); document.body.classList.remove('lock-scroll'); };

        function bindEventListeners() {
            document.getElementById('nav-groups-btn').onclick = () => { if(checkPass()) { editingGroupId = null; window.showUI('groups'); resetGrp(); } };
            document.getElementById('nav-admin-btn').onclick = () => { window.showUI('admin'); renderAdminList(); window.renderImports(); };
            document.getElementById('admin-done-btn').onclick = () => window.showUI('detail');
            document.getElementById('main-edit-btn').onclick = () => { if(checkPass()) openEditModal(); };
            document.getElementById('open-add-meeting-btn').onclick = () => { if(checkPass()) openAddModal(); };
            document.getElementById('close-add-modal-btn').onclick = () => document.getElementById('add-meeting-modal').classList.add('hidden-view');
            document.getElementById('direct-reg-btn').onclick = () => { if(currentMeeting) openReg(currentMeeting); };
            document.getElementById('guest-sign-btn').onclick = () => window.openSignPopup('observer', null);

            document.getElementById('reg-form').onsubmit = async (e) => {
                e.preventDefault(); const n = document.getElementById('reg-name').value.trim();
                let max = attendees.length > 0 ? Math.max(...attendees.map(a => a.order || 0)) : 0;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`), { title: document.getElementById('reg-title').value, name: n, signed: false, status: 'none', createdAt: serverTimestamp(), order: max + 1 });
                document.getElementById('reg-form').classList.add('hidden'); document.getElementById('reg-success').classList.remove('hidden');
            };

            document.getElementById('confirm-add-meeting-btn').onclick = async () => {
                const btn = document.getElementById('confirm-add-meeting-btn');
                const oldText = btn.textContent;
                const data = {
                    title: document.getElementById('m-title').value,
                    date: document.getElementById('m-date').value,
                    time: document.getElementById('m-time').value,
                    chairman: document.getElementById('m-chairman').value,
                    location: document.getElementById('m-location').value,
                    signStart: document.getElementById('m-sign-start').value,
                    signEnd: document.getElementById('m-sign-end').value,
                    regStart: document.getElementById('m-reg-start').value,
                    regEnd: document.getElementById('m-reg-end').value,
                };
                if (!data.title || !data.date) return alert('活動主題與日期必填。');
                try {
                    btn.disabled = true; btn.textContent = "儲存中...";
                    if (isEditingMeeting && currentMeeting) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'meetings', currentMeeting.id), data);
                    } else {
                        data.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'meetings'), data);
                    }
                    document.getElementById('add-meeting-modal').classList.add('hidden-view');
                } catch(e) { console.error(e); alert("儲存失敗"); } finally { btn.disabled = false; btn.textContent = oldText; }
            };

            document.getElementById('save-sig-btn').onclick = async () => {
                if (signaturePad.isEmpty()) return alert('請先簽名');
                const data = signaturePad.toDataURL('image/png', 0.6);
                if (activeSignPerson.type === 'attendee') await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, activeSignPerson.id), { signed: true, status: 'present', signature: data, signedAt: new Date().toISOString() });
                else {
                    const n = document.getElementById('sig-obs-name').value, d = document.getElementById('sig-obs-dept').value; if (!n || !d) return alert('資訊不全');
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `observers_${currentMeeting.id}`), { name: n, department: d, signature: data, signedAt: new Date().toISOString() });
                }
                window.closeSign();
            };

            document.getElementById('clear-sig-btn').onclick = () => signaturePad.clear();
            document.getElementById('show-qr-btn').onclick = () => showQR('sign');
            document.getElementById('show-reg-qr-btn').onclick = () => showQR('reg');
            document.getElementById('close-qr-modal-btn').onclick = () => document.getElementById('qr-modal').classList.add('hidden-view');
            document.getElementById('pdf-btn').onclick = exportPDF;
            document.getElementById('excel-btn').onclick = exportExcel;
            
            document.getElementById('batch-add-btn').onclick = async () => {
                const input = document.getElementById('batch-names-input').value; if (!input) return;
                const names = input.split(/[,，\n]/).map(n => n.trim()).filter(n => n);
                let max = attendees.length > 0 ? Math.max(...attendees.map(a => a.order || 0)) : 0;
                for (const raw of names) { max++; let title = '藥師', name = raw; if (raw.includes('-')) [title, name] = raw.split('-'); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`), { title, name, signed: false, status: 'none', createdAt: serverTimestamp(), order: max }); }
                document.getElementById('batch-names-input').value = '';
            };

            document.getElementById('clear-all-attendees-btn').onclick = async () => { if (checkPass() && confirm("確定清空名單？")) { for (const p of attendees) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, p.id)); } } };

            document.getElementById('save-group-btn').onclick = async () => {
                const n = document.getElementById('new-group-name').value, m = document.getElementById('new-group-members').value.split(/[,，\n]/).map(x => x.trim()).filter(x => x);
                if (!n || m.length===0) return alert('不全');
                if (editingGroupId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'groups', editingGroupId), { name: n, members: m });
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'groups'), { name: n, members: m, createdAt: serverTimestamp() });
                resetGrp();
            };
            document.getElementById('cancel-group-edit-btn').onclick = () => { editingGroupId = null; resetGrp(); };
        }

        function openAddModal() {
            isEditingMeeting = false; 
            document.getElementById('modal-title').textContent = "建立活動";
            document.getElementById('m-title').value = ''; 
            document.getElementById('m-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('m-chairman').value = ''; 
            document.getElementById('m-location').value = '藥劑科會議室';
            document.getElementById('m-sign-start').value = '08:00'; 
            document.getElementById('m-sign-end').value = '17:30';
            document.getElementById('m-reg-start').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('m-reg-end').value = '';
            document.getElementById('add-meeting-modal').classList.remove('hidden-view');
        }

        function openEditModal() {
            isEditingMeeting = true; 
            document.getElementById('modal-title').textContent = "編輯活動資訊";
            document.getElementById('m-title').value = currentMeeting.title || '';
            document.getElementById('m-date').value = currentMeeting.date || '';
            document.getElementById('m-time').value = currentMeeting.time || '';
            document.getElementById('m-chairman').value = currentMeeting.chairman || '';
            document.getElementById('m-location').value = currentMeeting.location || '';
            document.getElementById('m-sign-start').value = currentMeeting.signStart || '08:00';
            document.getElementById('m-sign-end').value = currentMeeting.signEnd || '17:30';
            document.getElementById('m-reg-start').value = currentMeeting.regStart || '';
            document.getElementById('m-reg-end').value = currentMeeting.regEnd || '';
            document.getElementById('add-meeting-modal').classList.remove('hidden-view');
        }

        function showQR(type) {
            const c = document.getElementById('qrcode-container'); c.innerHTML = '';
            const url = `https://fyhpharm1153.github.io/admin/meetingsign.html?${type === 'sign' ? 'm' : 'reg'}=${currentMeeting.id}`;
            new QRCode(c, { text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.H });
            document.getElementById('qr-meeting-title').textContent = currentMeeting.title;
            document.getElementById('qr-type-label').textContent = type === 'sign' ? '掃描進行簽到' : '掃描進行報名';
            document.getElementById('qr-modal').classList.remove('hidden-view');
        }

        function resetGrp() { document.getElementById('new-group-name').value = ''; document.getElementById('new-group-members').value = ''; document.getElementById('group-form-title').innerHTML = '<i data-lucide="users" class="mr-2 text-blue-600"></i> 設定常用名單'; document.getElementById('save-group-btn').textContent = '儲存設定'; document.getElementById('cancel-group-edit-btn').classList.add('hidden'); lucide.createIcons(); }

        async function exportPDF() {
            const b = document.getElementById('pdf-btn'); b.disabled = true; b.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> 生成中...'; lucide.createIcons();
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const all = [...attendees.sort((a,b)=>(a.order||0)-(b.order||0)).map(p => ({ title: p.title, name: p.name, signature: p.signature, note: p.status === 'duty'?'值班':p.status==='vacation'?'休假':p.status==='leave'?'請假':'' })), ...observers.map(o => ({ title: '列席', name: o.name, signature: o.signature, note: o.department }))];
            const rowsFirstPage = 9, rowsOtherPages = 15;
            let totalPages = all.length > rowsFirstPage ? 1 + Math.ceil((all.length - rowsFirstPage) / rowsOtherPages) : 1;
            const container = document.getElementById('pdf-export-container');
            container.style.left = "0px"; container.style.zIndex = "1000"; container.style.opacity = "0.01";
            for (let i = 0; i < totalPages; i++) {
                if (i > 0) pdf.addPage();
                const h = document.getElementById('pdf-header-section');
                if (i === 0) {
                    h.classList.remove('hidden-view');
                    document.getElementById('pdf-header-title-inner').textContent = currentMeeting.title;
                    document.getElementById('pdf-header-time-inner').textContent = "一、 時間：" + currentMeeting.date + " " + (currentMeeting.time||"");
                    document.getElementById('pdf-header-location-inner').textContent = "二、 地點：" + currentMeeting.location;
                    document.getElementById('pdf-header-chairman-inner').textContent = "三、 主席/主持人：" + (currentMeeting.chairman || '');
                } else { h.classList.add('hidden-view'); }
                const body = container.querySelector('.pdf-table-body-inner'); body.innerHTML = '';
                let start = (i===0) ? 0 : rowsFirstPage + (i-1)*rowsOtherPages;
                let end = Math.min(start + (i===0 ? rowsFirstPage : rowsOtherPages), all.length);
                for (let j = start; j < end; j++) {
                    const p = all[j]; const tr = document.createElement('tr'); tr.className = "h-[50px] border border-black";
                    tr.innerHTML = `<td class="p-3 text-sm border-2 border-black text-black">${p.title}</td><td class="p-3 text-xl font-bold border-2 border-black text-black">${p.name}</td><td class="p-2 border-2 border-black text-black">${p.signature ? `<img src="${p.signature}" style="max-height:45px; width:110px; margin:auto;">` : ''}</td><td class="p-3 text-sm border-2 border-black text-black">${p.note}</td>`;
                    body.appendChild(tr);
                }
                const f = container.querySelector('.pdf-footer-stats-inner');
                if (i === totalPages - 1) { const ok = attendees.filter(a => a.status === 'present').length; f.classList.remove('hidden'); f.innerHTML = `出席率：${Math.round((ok/attendees.length)*100)}% (實到 ${ok} / 應到 ${attendees.length})`; } else { f.classList.add('hidden'); }
                document.getElementById('pdf-pagination-text').textContent = `共 ${totalPages} 頁，第 ${i + 1} 頁`;
                const canvas = await html2canvas(document.getElementById('pdf-page-template'), { scale: 2.5, useCORS: true, logging: false });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, 210, (canvas.height*210)/canvas.width);
            }
            container.style.left = "-9999px";
            pdf.save(`簽到單_${currentMeeting.title}.pdf`); b.disabled = false; b.innerHTML = '<i data-lucide="file-text"></i> 匯出 PDF'; lucide.createIcons();
        }

        function exportExcel() {
            const rows = [["豐原醫院 簽到表"], ["活動", currentMeeting.title], ["時間", currentMeeting.date], ["名單"]];
            attendees.sort((a,b)=>(a.order||0)-(b.order||0)).forEach(p => rows.push([p.title, p.name, p.status==='present'?"出席":p.status, p.signedAt||'']));
            const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `${currentMeeting.title}.xlsx`);
        }

        function renderAdminList() {
            const c = document.getElementById('admin-attendees-list'); c.innerHTML = ''; const sorted = attendees.sort((a,b)=>(a.order||0)-(b.order||0));
            sorted.forEach((p, idx) => {
                const div = document.createElement('div'); div.className = "p-4 border-b last:border-0 flex justify-between items-center bg-white hover:bg-slate-50";
                div.innerHTML = `<div class="flex items-center gap-4"><div class="flex flex-col"><button onclick="window.moveAtt('${p.id}',-1)" class="text-blue-500"><i data-lucide="chevron-up" size="18"></i></button><button onclick="window.moveAtt('${p.id}',1)" class="text-blue-600"><i data-lucide="chevron-down" size="18"></i></button></div><span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-black tracking-tighter">${p.title}</span><span class="font-black text-slate-700 text-lg">${p.name}</span></div><button class="text-red-300 hover:text-red-500 p-2" onclick="window.delReg('${p.id}')"><i data-lucide="trash-2" size="20"></i></button>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }
        window.moveAtt = async (id, dir) => {
            const s = attendees.sort((a,b)=>(a.order||0)-(b.order||0)); const i = s.findIndex(x => x.id === id); if (i===-1||(i+dir<0)||(i+dir>=s.length)) return;
            const a = s[i], b = s[i+dir];
            const attPathA = doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, a.id);
            const attPathB = doc(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`, b.id);
            await updateDoc(attPathA, { order: b.order || 0 }); 
            await updateDoc(attPathB, { order: a.order || 0 });
        };

        function renderGroups() {
            const c = document.getElementById('groups-container'); c.innerHTML = '';
            groups.forEach(g => {
                const div = document.createElement('div'); div.className = "bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm";
                div.innerHTML = `<div class="flex-1"><h4 class="font-black text-slate-800 text-lg">${g.name}</h4><p class="text-xs text-slate-400 mt-1 truncate">${g.members.join(', ')}</p></div><div class="flex gap-2"><button class="p-3 text-blue-500 bg-blue-50 rounded-2xl" onclick="window.editGrp('${g.id}')"><i data-lucide="edit-3" size="20"></i></button><button class="p-3 text-red-400 bg-red-50 rounded-2xl" onclick="window.delGrp('${g.id}')"><i data-lucide="trash-2" size="20"></i></button></div>`;
                c.appendChild(div);
            }); lucide.createIcons();
        }

        window.editGrp = (id) => {
            const g = groups.find(x => x.id === id); if (!g) return; editingGroupId = id;
            document.getElementById('new-group-name').value = g.name; document.getElementById('new-group-members').value = g.members.join(', ');
            document.getElementById('group-form-title').innerHTML = '<i data-lucide="edit-3" class="mr-2 text-blue-600"></i> 編輯模式';
            document.getElementById('save-group-btn').textContent = '更新設定'; document.getElementById('cancel-group-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' }); lucide.createIcons();
        };
        window.delGrp = async (id) => { if(checkPass() && confirm("確定刪除此常用群組？")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'groups', id)); };
        
        window.renderImports = () => {
            const c = document.getElementById('group-import-container'); if(!c) return;
            c.innerHTML = groups.length===0 ? '<p class="text-xs text-slate-400">目前無預設群組</p>' : '';
            groups.forEach(g => {
                const b = document.createElement('button'); b.className = "bg-white border-2 border-blue-100 text-blue-700 px-4 py-2 rounded-2xl text-xs font-black shadow-sm hover:bg-blue-50 transition-all m-1";
                b.textContent = `+ ${g.name}`; 
                b.onclick = async () => {
                    let max = attendees.length > 0 ? Math.max(...attendees.map(a => a.order || 0)) : 0;
                    for (let i = 0; i < g.members.length; i++) {
                        const raw = g.members[i];
                        max++; 
                        let title = '藥師', name = raw; 
                        if (raw.includes('-')) [title, name] = raw.split('-'); 
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `attendees_${currentMeeting.id}`), { 
                            title, name, signed: false, status: 'none', createdAt: serverTimestamp(), order: max 
                        }); 
                    }
                }; c.appendChild(b);
            });
        }
    </script>
</body>
